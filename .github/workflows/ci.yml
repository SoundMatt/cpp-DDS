name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: clang-14
            std: 17
            cc: clang-14
            cxx: clang++-14
          - os: ubuntu-22.04
            compiler: gcc-12
            std: 17
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-22.04
            compiler: gcc-12
            std: 20
            cc: gcc-12
            cxx: g++-12
          - os: macos-14
            compiler: clang
            std: 17
            cc: clang
            cxx: clang++
          - os: windows-2022
            compiler: msvc
            std: 17
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Install tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -j1

  sanitizers:
    name: ASan + UBSan (IEC 61508 SIL-2 dynamic analysis)
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build gcc-12 g++-12

      - name: Configure (ASan + UBSan)
        env:
          CC: gcc-12
          CXX: g++-12
        run: |
          cmake -B build-san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -G Ninja

      - name: Build
        run: cmake --build build-san --parallel

      - name: Test with sanitizers
        env:
          ASAN_OPTIONS: "halt_on_error=1:detect_stack_use_after_return=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: ctest --test-dir build-san --output-on-failure -j1

  coverage:
    name: Coverage (LCOV)
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build lcov

      - name: Configure (coverage build)
        run: |
          cmake -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -G Ninja

      - name: Build
        run: cmake --build build-cov --parallel

      - name: Test
        run: ctest --test-dir build-cov --output-on-failure -j1

      - name: Generate LCOV report
        run: |
          lcov --capture --directory build-cov \
               --output-file coverage.info \
               --ignore-errors inconsistent \
               --no-external
          lcov --remove coverage.info '*/tests/*' '*/cli/*' \
               --output-file coverage.info
          lcov --summary coverage.info

  relay-conform:
    name: RELAY conformance (relay conform)
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build

      - name: Build CLI
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -G Ninja
          cmake --build build --parallel --target cpp-dds

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install relay tool
        run: go install github.com/SoundMatt/RELAY/cmd/relay@latest

      - name: RELAY conformance gate
        run: relay conform ./build/cli/cpp-dds --strict

  fusa-asil-b:
    name: cpp-FuSa ASIL-B qualification
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - name: Check out cpp-DDS
        uses: actions/checkout@v4
        with:
          path: cpp-DDS

      - name: Check out cpp-FuSa
        uses: actions/checkout@v4
        with:
          repository: SoundMatt/cpp-FuSa
          path: cpp-FuSa

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build zip

      - name: Build cpfusa
        run: |
          cmake -B cpp-FuSa/build \
            -S cpp-FuSa \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build cpp-FuSa/build --parallel

      - name: cpfusa init
        working-directory: cpp-DDS
        run: ../cpp-FuSa/build/cpfusa init --name cpp-DDS --standard iso26262 --asil ASIL-B --project-version 0.1.0 --force || true

      - name: cpfusa check
        working-directory: cpp-DDS
        run: ../cpp-FuSa/build/cpfusa check --dir .

      - name: cpfusa lint
        working-directory: cpp-DDS
        run: ../cpp-FuSa/build/cpfusa lint --dir . || true

      - name: cpfusa trace (requirements traceability)
        working-directory: cpp-DDS
        run: ../cpp-FuSa/build/cpfusa trace --dir .

  dco:
    name: DCO check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: tisonkun/actions-dco@v1

  sarif:
    name: SARIF upload
    runs-on: ubuntu-22.04
    needs: build-and-test
    permissions:
      security-events: write
    steps:
      - name: Check out cpp-DDS
        uses: actions/checkout@v4
        with:
          path: cpp-DDS

      - name: Check out cpp-FuSa
        uses: actions/checkout@v4
        with:
          repository: SoundMatt/cpp-FuSa
          path: cpp-FuSa

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build

      - name: Build cpfusa
        run: |
          cmake -B cpp-FuSa/build \
            -S cpp-FuSa \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build cpp-FuSa/build --parallel

      - name: cpfusa init
        working-directory: cpp-DDS
        run: ../cpp-FuSa/build/cpfusa init --name cpp-DDS --standard iso26262 --asil ASIL-B --project-version 0.1.0 --force || true

      - name: Generate SARIF report
        working-directory: cpp-DDS
        run: |
          ../cpp-FuSa/build/cpfusa check \
            --format sarif \
            --output cpfusa.sarif \
            --dir . || true

      - name: Upload SARIF to GitHub Security tab
        if: hashFiles('cpp-DDS/cpfusa.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cpp-DDS/cpfusa.sarif
